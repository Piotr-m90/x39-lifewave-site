<script type="text/babel">
const { useState, useEffect } = React;

function detectLocale() {
  // Priority: URL ?lang=, localStorage, browser, default 'pl'
  try {
    const urlLang = new URLSearchParams(location.search).get("lang");
    if (urlLang && ["pl","en","de"].includes(urlLang)) return urlLang;
  } catch(e) {}
  try {
    const stored = localStorage.getItem("x39_lang");
    if (stored && ["pl","en","de"].includes(stored)) return stored;
  } catch(e) {}
  const browser = (navigator.language || "pl").slice(0,2).toLowerCase();
  return ["pl","en","de"].includes(browser) ? browser : "pl";
}

function App() {
  const [locale, setLocale] = useState(detectLocale());
  const t = COPY[locale];

  useEffect(() => {
    document.documentElement.lang = locale;
    document.title = locale === "pl"
      ? "X39 LifeWave — Aktywuj swoje komórki macierzyste bez iniekcji"
      : locale === "en"
        ? "X39 LifeWave — Activate your stem cells without injections"
        : "X39 LifeWave — Aktiviere deine Stammzellen ohne Injektionen";
  }, [locale]);

  useEffect(() => {
    // Hide loading splash once mounted
    const el = document.getElementById("x-loading");
    if (el) {
      requestAnimationFrame(() => el.classList.add("is-hidden"));
      setTimeout(() => el.remove(), 700);
    }
  }, []);

  return (
    <AppCtx.Provider value={{ t, locale, setLocale }}>
      <GlobalNav/>
      <SubNav/>
      <Hero/>
      <BodyBatterySection/>
      <PeptideSection/>
      <AgeSection/>
      <CompareSection/>
      <AuthoritySection/>
      <TimelineSection/>
      <HowSection/>
      <ScienceSection/>
      <GuaranteeSection/>
      <FaqSection/>
      <ContactSection/>
      <Footer/>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>

  setTimeout(function () {

    if (l && (!r || r.children.length === 0)) {

</script>
