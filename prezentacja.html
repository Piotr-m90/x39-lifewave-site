<style>
  html, body { margin: 0; padding: 0; background: #f5f5f7; overflow: hidden; }
  #x-loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #f5f5f7; z-index: 9999;
    transition: opacity 400ms ease, visibility 400ms;
  }
  #x-loading.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .x-loading-spin {
    width: 56px; height: 56px; border-radius: 50%;
    background: conic-gradient(from 0deg, #E8C5A8, #C9A38A, #A8806A, #E8C5A8);
    -webkit-mask: radial-gradient(circle at center, transparent 22px, black 23px);
            mask: radial-gradient(circle at center, transparent 22px, black 23px);
    animation: x-spin-load 1.2s linear infinite;
  }
  @keyframes x-spin-load { to { transform: rotate(360deg); } }
</style>

<div id="x-loading"><div class="x-loading-spin" aria-label="Loading"></div></div>

<script type="text/babel">
const { useState, useEffect } = React;

function detectLocale() {
  try {
    const urlLang = new URLSearchParams(location.search).get("lang");
    if (urlLang && ["pl","en","de"].includes(urlLang)) return urlLang;
  } catch(e) {}
  try {
    const stored = localStorage.getItem("x39_lang");
    if (stored && ["pl","en","de"].includes(stored)) return stored;
  } catch(e) {}
  const browser = (navigator.language || "pl").slice(0,2).toLowerCase();
  return ["pl","en","de"].includes(browser) ? browser : "pl";
}

function DeckApp() {
  const [locale, setLocale] = useState(detectLocale());
  const t = COPY[locale];
  useEffect(() => { document.documentElement.lang = locale; }, [locale]);
  useEffect(() => {
    const el = document.getElementById("x-loading");
    if (el) { requestAnimationFrame(() => el.classList.add("is-hidden")); setTimeout(() => el.remove(), 700); }
  }, []);
  return (
    <AppCtx.Provider value={{ t, locale, setLocale }}>
      <SlideDeck/>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DeckApp/>);
</script>

<script>
  setTimeout(function () {
    var l = document.getElementById("x-loading");
    var r = document.getElementById("root");
    if (l && (!r || r.children.length === 0)) {
      l.innerHTML = '<div style="text-align:center;font-family:Inter,system-ui,sans-serif;color:#1d1d1f;padding:24px;max-width:420px"><p style="font-size:18px;font-weight:600;margin:0 0 8px">Prezentacja ładuje się dłużej niż zwykle…</p><p style="font-size:14px;color:#7a7a7a;margin:0">Odśwież: Cmd+Shift+R. Lub wróć na <a href="index.html" style="color:#A8806A">stronę główną</a>.</p></div>';
    }
  }, 10000);
</script>
